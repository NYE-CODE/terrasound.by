# Include inside server { } — path on server:
#   include /var/www/terrasound.by/deploy/nginx/includes/static-cache.conf;
#
# Vite emits hashed filenames under /assets/ → safe to cache for 1 year.
# HTML (index + prerendered routes) must stay fresh so clients pick up new hashes.

location ^~ /assets/ {
    include /var/www/terrasound.by/deploy/nginx/includes/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

location ^~ /fonts/ {
    include /var/www/terrasound.by/deploy/nginx/includes/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

location ~* \.html$ {
    include /var/www/terrasound.by/deploy/nginx/includes/security-headers.conf;
    add_header Cache-Control "no-cache";
}

location ~* \.(?:ico|webmanifest)$ {
    include /var/www/terrasound.by/deploy/nginx/includes/security-headers.conf;
    add_header Cache-Control "public, max-age=604800";
}
