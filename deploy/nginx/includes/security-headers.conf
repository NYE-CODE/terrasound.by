# Include inside server { } (HTTPS) or inside location { } that sets Cache-Control.
# Path on server: /var/www/terrasound.by/deploy/nginx/includes/security-headers.conf

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
# Report-Only: без upgrade-insecure-requests (в report-only браузер игнорирует и пишет в консоль)
add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://mc.yandex.ru wss://mc.yandex.ru; frame-src https://yandex.ru https://yandex.by https://mc.yandex.ru; form-action 'self'" always;
