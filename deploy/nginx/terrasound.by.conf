# Main site: terrasound.by + API at /api/ (no api. subdomain)
#
# Install on server:
#   cp deploy/nginx/terrasound.by.conf /etc/nginx/sites-available/terrasound.by
#   ln -sf /etc/nginx/sites-available/terrasound.by /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# SSL (if not yet):
#   certbot --nginx -d terrasound.by -d www.terrasound.by
#
# Check:
#   curl -s https://terrasound.by/api/v1/health

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name terrasound.by www.terrasound.by;

    ssl_certificate /etc/letsencrypt/live/terrasound.by/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/terrasound.by/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/terrasound.by/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name terrasound.by www.terrasound.by 45.135.234.160;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /var/www/terrasound.by/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}
