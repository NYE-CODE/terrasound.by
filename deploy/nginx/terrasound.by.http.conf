# HTTP only — use before certbot, or if SSL paths break nginx -t
# cp deploy/nginx/terrasound.by.http.conf /etc/nginx/sites-available/terrasound.by

server {
    listen 80;
    listen [::]:80;
    server_name terrasound.by www.terrasound.by 45.135.234.160;

    root /var/www/terrasound.by/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    include /var/www/terrasound.by/deploy/nginx/includes/static-cache.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
