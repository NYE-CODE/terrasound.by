# Admin panel (optional subdomain)
# cp deploy/nginx/admin.terrasound.by.conf /etc/nginx/sites-available/admin.terrasound.by
# certbot --nginx -d admin.terrasound.by
#
# Build admin with ADMIN_VITE_API_URL= (пусто) — запросы на /api/ этого же домена

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.terrasound.by;

    ssl_certificate /etc/letsencrypt/live/admin.terrasound.by/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.terrasound.by/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /var/www/terrasound.by/deploy/nginx/includes/security-headers.conf;

    root /var/www/terrasound.by/admin/dist;
    index index.html;

    # API на том же origin — без CORS (admin собирается с пустым VITE_API_URL)
    location /api/ {
        client_max_body_size 12m;
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    include /var/www/terrasound.by/deploy/nginx/includes/static-cache.conf;

    location ^~ /uploads/ {
        include /var/www/terrasound.by/deploy/nginx/includes/security-headers.conf;
        alias /var/www/terrasound.by/uploads/;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.terrasound.by;

    location /.well-known/acme-challenge/ {
        root /var/www/terrasound.by/admin/dist;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
