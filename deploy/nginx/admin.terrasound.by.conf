# Admin panel (optional subdomain)
# cp deploy/nginx/admin.terrasound.by.conf /etc/nginx/sites-available/admin.terrasound.by
# certbot --nginx -d admin.terrasound.by
#
# Build admin with: VITE_API_URL=https://terrasound.by

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name admin.terrasound.by;

    ssl_certificate /etc/letsencrypt/live/admin.terrasound.by/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.terrasound.by/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/terrasound.by/admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.terrasound.by;

    root /var/www/terrasound.by/admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
